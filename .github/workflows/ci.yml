name: CI

# Quality gates on every PR + push to main: lint, typecheck, build, unit tests.
#
# Deploys are NOT handled here — Vercel's GitHub integration auto-deploys
# (push to main → production at stickr.brac.dev, PR → preview). See
# docs/DEPLOYMENT.md. To make a red build block the deploy, set this `quality`
# check as a required status check on `main` in GitHub branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per ref; cancel superseded runs (a new push supersedes an in-flight one).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build` runs `tsc -b && vite build`, so this covers typecheck too.
      # Dummy VITE_* keep any build-time env reference defined; this artifact is a
      # gate only — Vercel does the real, deployed build with the project's env.
      - name: Typecheck + build
        run: npm run build
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Unit tests
        run: npm run test

  e2e:
    name: E2E · local Supabase (smoke · journey · account deletion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      # Recreate the DB from the committed migrations so the e2e schema ALWAYS
      # matches them. This is the guardrail for the drift that silently broke the
      # journey locally (a dev DB left 8 migrations behind → reward_tier.active
      # missing → Home's Promise.all rejected → blank board). CI always starts
      # clean, so this can't recur here.
      - name: Reset DB (apply all migrations clean)
        run: supabase db reset

      # delete-account + send-award-push, served locally so the (destructive,
      # local-only) account-deletion specs can run instead of self-skipping.
      - name: Serve Edge Functions
        run: nohup supabase functions serve > /tmp/supabase-functions.log 2>&1 &

      - name: Wait for delete-account to be served
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              http://127.0.0.1:54321/functions/v1/delete-account || true)
            # A served function answers 401 (no JWT); 000/503 = not ready yet.
            if [ "$code" != "000" ] && [ "$code" != "503" ]; then
              echo "delete-account served (HTTP $code)"; exit 0
            fi
            sleep 2
          done
          echo "::warning::delete-account not served — account-deletion specs will self-skip"

      # Point the dev server (Playwright's webServer runs `npm run dev`) at the
      # local stack. The anon key is the well-known Supabase local demo key — not
      # a secret. The data-writing specs additionally hard-block any non-loopback
      # Supabase request (e2e/supabase-env.ts), so this can never hit a remote.
      - name: Point dev server at local Supabase
        run: |
          cat > .env.local <<'EOF'
          VITE_SUPABASE_URL=http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          EOF

      - name: E2E
        run: npm run e2e
        env:
          # Opt in to the destructive account-deletion specs; the loopback guard
          # + blockNonLocalSupabase keep them safely on the local stack.
          E2E_ACCOUNT_DELETION: '1'
          VITE_SUPABASE_URL: http://127.0.0.1:54321

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
